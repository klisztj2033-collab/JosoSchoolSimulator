<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>常総学院シミュレーター</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    #password-gate {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(160deg, #fdf3f5 0%, #eef3ff 100%);
    }
    #password-gate .gate-box {
      background: #fff; border: 2px solid #f0c8d4; border-radius: 20px;
      padding: 40px 44px; text-align: center;
      box-shadow: 0 8px 32px rgba(216,160,180,0.25);
      min-width: 300px;
    }
    #password-gate h2 {
      font-size: 22px; letter-spacing: 3px; margin-bottom: 6px;
      background: linear-gradient(180deg, #ff7fa3, #5b8cff);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    #password-gate p {
      font-size: 13px; color: #8d8798; margin-bottom: 24px;
    }
    #password-gate input {
      width: 100%; padding: 12px 16px; font-size: 18px; letter-spacing: 4px;
      border: 2px solid #f0c8d4; border-radius: 12px; text-align: center;
      outline: none; margin-bottom: 14px; box-sizing: border-box;
      font-family: inherit;
    }
    #password-gate input:focus { border-color: #ff7fa3; }
    #password-gate button {
      width: 100%; padding: 13px; font-size: 16px; font-weight: bold;
      background: #ff7fa3; color: #fff; border: none; border-radius: 999px;
      cursor: pointer; box-shadow: 0 3px 0 #d96287;
      transition: transform .08s;
    }
    #password-gate button:hover { transform: translateY(-1px); }
    #password-gate button:active { transform: translateY(1px); box-shadow: none; }
    #password-gate .gate-error {
      color: #e2566b; font-size: 13px; margin-top: 10px;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <!-- パスワードゲート -->
  <div id="password-gate">
    <div class="gate-box">
      <h2>常総学院<br>シミュレーター</h2>
      <p>パスワードを入力してください</p>
      <input id="gate-input" type="password" placeholder="••••••••" maxlength="20"
             onkeydown="if(event.key==='Enter')gateSubmit()">
      <button onclick="gateSubmit()">入る</button>
      <div class="gate-error" id="gate-error"></div>
    </div>
  </div>

  <div id="app" style="display:none"></div>
  <script src="js/data.js?v=12"></script>
  <script src="js/test.js?v=12"></script>
  <script src="js/life.js?v=12"></script>
  <script src="js/mochiken.js?v=12"></script>
  <script src="js/game.js?v=12"></script>
  <script>
    const GATE_HASH = "d2b89d0b1fbff904c6c5cff7d0c822c5ec5e89a031771625cb81ff75e38f23d5";
    const GATE_KEY  = "joso_auth";

    async function hashStr(s) {
      const buf = await crypto.subtle.digest("SHA-256",
        new TextEncoder().encode(s));
      return Array.from(new Uint8Array(buf))
        .map(b => b.toString(16).padStart(2, "0")).join("");
    }

    async function gateSubmit() {
      const val = document.getElementById("gate-input").value;
      const h   = await hashStr(val);
      if (h === GATE_HASH) {
        sessionStorage.setItem(GATE_KEY, "1");
        document.getElementById("password-gate").remove();
        document.getElementById("app").style.display = "";
      } else {
        const err = document.getElementById("gate-error");
        err.textContent = "パスワードが違います";
        document.getElementById("gate-input").value = "";
        setTimeout(() => { err.textContent = ""; }, 2000);
      }
    }

    // すでに認証済みならスキップ
    if (sessionStorage.getItem(GATE_KEY) === "1") {
      document.getElementById("password-gate").remove();
      document.getElementById("app").style.display = "";
    }
  </script>
</body>
</html>
